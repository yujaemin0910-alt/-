<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.5, maximum-scale=5.0" />
    <title>문의 - Silverkorea</title>
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.js"></script>
    <script>
        (function(){
            var fs = localStorage.getItem('fontSize');
            if(fs === 'large') document.documentElement.classList.add('font-large');
            if(fs === 'xlarge') document.documentElement.classList.add('font-xlarge');
        })();
    </script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9531983779628478" crossorigin="anonymous"></script>

    <style>
        .inquiry-form-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            padding: 2rem;
            margin-bottom: 3rem;
        }
        .inquiry-form-container iframe {
            width: 100%;
            min-height: 600px;
            border: none;
        }
        @media (max-width: 600px) {
            .inquiry-form-container iframe {
                min-height: 500px;
            }
        }
    </style>
</head>
<body>

    <site-header></site-header>

    <main class="about-page">
        <div class="about-container">
            <div class="about-content">
                <h1>문의하기</h1>
                <p class="last-updated">광고 및 제휴에 관한 문의는 아래 폼을 작성해 주세요. 작성해 주시면 확인 후 답변 드리겠습니다.</p>
                <p><strong>이메일:</strong> vertexsilverkorea@gmail.com</p>

                <div class="inquiry-form-container">
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeanamkmVtvPmfBRlI8THZCQg2v0NziR0Pd5NKCcw4Jsdxkwg/viewform?embedded=true" loading="lazy">로딩 중...</iframe>
                </div>

                <p class="notice">※ 문의 내용은 광고 목적 외에는 사용되지 않습니다.</p>

                <a href="/" class="btn-primary btn-back">메인으로 돌아가기</a>
            </div>
        </div>
    </main>

    <site-footer></site-footer>

</body>
</html>
