<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시니어 정책 정보센터</title>
    <meta name="description" content="" />
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.js"></script>
    <!-- Marked.js for Markdown to HTML conversion -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <site-header></site-header>

    <main class="article-page">
        <section id="article-content" class="article-content">
            <!-- Content will be loaded here by JavaScript -->
        </section>
    </main>

    <site-footer></site-footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('id');
            const articleContent = document.getElementById('article-content');

            if (!articleId) {
                articleContent.innerHTML = '<p>게시글을 찾을 수 없습니다. <a href="/">홈으로 돌아가기</a></p>';
                return;
            }

            try {
                const response = await fetch(`/articles/${articleId}.md`);
                if (!response.ok) {
                    throw new Error('게시글 파일을 불러오는 데 실패했습니다.');
                }
                const markdown = await response.text();
                
                // --- Parse Frontmatter ---
                const match = markdown.match(/^---\n([\s\S]+?)\n---\n/);
                const frontmatter = {};
                if (match) {
                    match[1].split('\n').forEach(line => {
                        const [key, ...value] = line.split(':');
                        if (key && value) {
                            frontmatter[key.trim()] = value.join(':').trim();
                        }
                    });
                }
                
                const content = markdown.replace(/^---\n[\s\S]+?\n---\n/, '').trim();

                // --- Update Metadata & Title ---
                document.title = `${frontmatter.title || '게시글'} - 시니어 정책 정보센터`;
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc && frontmatter.description) {
                    metaDesc.setAttribute('content', frontmatter.description);
                }

                // --- Render HTML ---
                let html = `
                    <div class="article-header">
                        <h1 class="article-title">${frontmatter.title || '제목 없음'}</h1>
                        <p class="article-meta">게시일: ${frontmatter.date || '날짜 없음'}</p>
                    </div>
                    <div class="article-body">
                        ${marked.parse(content)}
                        <a href="/" class="btn-primary btn-back">목록으로 돌아가기</a>
                    </div>
                `;
                articleContent.innerHTML = html;

            } catch (error) {
                console.error('Error loading article:', error);
                articleContent.innerHTML = '<p>게시글을 불러오는 중 오류가 발생했습니다. <a href="/">홈으로 돌아가기</a></p>';
            }
        });
    </script>

</body>
</html>
