    <script>
        let currentCategory = 'all';
        const itemsPerPage = 8;
        let currentPage = 1;

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') filterArticles();
            });
            showPage(1);
        });

        function showPage(page) {
            currentPage = page;
            const cards = document.querySelectorAll('article-card');
            const visibleCards = Array.from(cards).filter(card => {
                const category = card.getAttribute('data-category') || '';
                const title = card.getAttribute('title') || '';
                const description = card.getAttribute('description') || '';
                const matchesCategory = currentCategory === 'all' || category === currentCategory;
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const matchesSearch = !searchTerm || title.toLowerCase().includes(searchTerm) || description.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });

            cards.forEach((card) => {
                const visibleIndex = visibleCards.indexOf(card);
                const start = (page - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                card.style.display = (visibleIndex >= start && visibleIndex < end) ? '' : 'none';
            });

            renderPagination(visibleCards.length, page);
            
            setTimeout(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 50);
        }

        function renderPagination(totalItems, currentPage) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="showPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => {
                const catName = getCategoryName(category);
                tab.classList.toggle('active', tab.textContent === catName);
            });
            showPage(1);
        }

        function getCategoryName(cat) {
            const names = {
                'all': '전체', 'pension': '연금·생활', 'health': '건강·의료',
                'work': '일자리', 'transport': '교통·요금', 'digital': '디지털', 'etc': '기타'
            };
            return names[cat] || '전체';
        }

        function filterArticles() {
            showPage(1);
        }
    </script>
